name: Daily DevOps Commits

on:
  schedule:
    - cron: '0 4 * * *'   # 05:00 UTC daily (09:30 IST)
  workflow_dispatch:      # manual trigger for testing
    inputs:
      force:
        description: 'Force run (skip the skip-check)'
        type: boolean
        default: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  daily-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2   # latest v4 with Node 24 support
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.4.0   # latest v5 with Node 24 support
        with:
          python-version: '3.11'

      - name: Configure git
        run: |
          git config user.name "DineshKNarayanankutty"
          git config user.email "dineshknarayanankutty@gmail.com"

      - name: Check if today is a skip day
        id: skip_check
        run: |
          python - <<'EOF'
          import hashlib, os
          from datetime import date

          force = "${{ github.event.inputs.force }}" == "true"
          today = date.today().isoformat()
          seed  = int(hashlib.md5(today.encode()).hexdigest(), 16) % 100
          skip  = "false" if force else ("true" if seed < 25 else "false")
          print(f"Skip decision for {today}: {skip} (seed={seed}, forced={force})")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"skip={skip}\n")
          EOF

      - name: Run daily commit engine
        if: steps.skip_check.outputs.skip == 'false'
        run: python Scripts/daily_engine.py

      - name: Push all commits
        if: steps.skip_check.outputs.skip == 'false'
        run: git push