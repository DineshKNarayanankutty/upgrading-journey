# azure-pipelines.yml
# Full CI/CD Pipeline: Build → Staging → Production (with manual approval gate)

trigger:
  branches:
    include:
      - main
      - develop

variables:
  # ── Docker / ACR ──────────────────────────────────────────
  dockerRegistryServiceConnection: 'acr-service-connection'
  imageRepository: 'my-app-dkn'
  containerRegistry: 'myregistry.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

  # ── AKS (shared) ──────────────────────────────────────────
  aksServiceConnection: 'aks-arm-service-connection'  # ARM-based service connection

  # ── Helm ──────────────────────────────────────────────────
  chartPath: '$(Build.SourcesDirectory)/charts/my-app'
  releaseName: 'my-app-release'

  # ── Staging AKS ───────────────────────────────────────────
  stagingResourceGroup: 'staging-rg'
  stagingAksCluster: 'staging-aks-cluster'
  stagingNamespace: 'staging'

  # ── Production AKS ────────────────────────────────────────
  prodResourceGroup: 'prod-rg'
  prodAksCluster: 'prod-aks-cluster'
  prodNamespace: 'production'

# =============================================================
# STAGE 1 — BUILD & PUSH
# =============================================================
stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    displayName: 'Build & Push to ACR'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: Docker@2
      displayName: 'Build and Push (buildId + latest tags)'
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

# =============================================================
# STAGE 2 — DEPLOY TO STAGING (auto, on any branch)
# =============================================================
- stage: DeployStaging
  displayName: 'Deploy to Staging'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployStaging
    displayName: 'Helm Deploy → Staging AKS'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'Staging'        # Add approval checks in Azure DevOps UI if desired
    strategy:
      runOnce:
        deploy:
          steps:

          - task: HelmInstaller@1
            displayName: 'Install Helm (latest)'
            inputs:
              helmVersionToInstall: 'latest'

          - task: HelmDeploy@0
            displayName: 'Helm Upgrade — Staging'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscription: $(aksServiceConnection)
              azureResourceGroup: $(stagingResourceGroup)
              kubernetesCluster: $(stagingAksCluster)
              namespace: $(stagingNamespace)
              command: 'upgrade' 
              chartType: 'FilePath'
              chartPath: $(chartPath)
              releaseName: $(releaseName)
              valueFile: '$(chartPath)/values-staging.yaml'
              overrideValues: 'image.repository=$(containerRegistry)/$(imageRepository),image.tag=$(tag),replicaCount=2'
              install: true             # creates release if it doesn't exist yet
              waitForExecution: true    # waits for rollout to complete
              failOnStderr: true

# =============================================================
# STAGE 3 — DEPLOY TO PRODUCTION (manual approval, main only)
# =============================================================
- stage: DeployProd
  displayName: 'Deploy to Production'
  dependsOn: DeployStaging
  # Only runs when: staging succeeded AND the source branch is main
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployProd
    displayName: 'Helm Deploy → Production AKS'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'Production'     # ← Configure manual approval gate HERE in Azure DevOps UI
    strategy:
      runOnce:
        deploy:
          steps:

          - task: HelmInstaller@1
            displayName: 'Install Helm (latest)'
            inputs:
              helmVersionToInstall: 'latest'

          - task: HelmDeploy@0
            displayName: 'Helm Upgrade — Production'
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscription: $(aksServiceConnection)
              azureResourceGroup: $(prodResourceGroup)
              kubernetesCluster: $(prodAksCluster)
              namespace: $(prodNamespace)
              command: 'upgrade'
              chartType: 'FilePath'
              chartPath: $(chartPath)
              releaseName: $(releaseName)
              valueFile: '$(chartPath)/values-prod.yaml'
              overrideValues: 'image.repository=$(containerRegistry)/$(imageRepository),image.tag=$(tag),replicaCount=5'
              install: true
              waitForExecution: true
              failOnStderr: true